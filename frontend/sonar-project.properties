# Configuration for SonarCloud/SonarQube analysis of React Frontend
sonar.projectKey=EV-Service-Center-Frontend
sonar.projectName=EV Service Center - Frontend
sonar.sources=src
sonar.exclusions=node_modules/**,dist/**,build/**,coverage/**,vite.config.js,tailwind.config.js,postcss.config.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
