sonar.projectKey=adminservice
sonar.projectName=Admin Service
sonar.projectVersion=1.0

# Path to source directories 
sonar.sources=src/main/java

# Path to test directories (if you have unit tests)
sonar.tests=src/test/java

# Compiled classes directory (required for Java)
sonar.java.binaries=target/classes

# Code coverage report path (if using JaCoCo)
# sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude specific files/directories from analysis (optional)
# sonar.exclusions=**/config/**,**/dto/**
